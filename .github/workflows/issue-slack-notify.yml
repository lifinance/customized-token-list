# on-new-issue — Token-related issue housekeeping + Slack notification.
#
# Triggers when a new issue is opened. For issues created from either of the
# token-related templates:
#   - `token-request` (add a token)
#   - `deny-request`  (report a scam token)
#
# the workflow:
#   1. Parses the structured form body.
#   2. Rewrites the title from "[token request]" / "[deny request]" placeholder
#      to "[token request] chain <id> <symbol>" / "[deny request] chain <id> <addr>"
#      so the issues list, search, and Slack notification all show real data.
#   3. Posts a Slack ping to #dev-backend-expansion-review with the resolved
#      title so internals can pick it up fast. The Slack message tells them
#      which command to run (`/add-token` vs `/deny-token`).
#
# For non-token-related issues, only the Slack ping fires (with the original
# title untouched).
#
# Only fires on `opened` (not edits / labels / comments) to avoid noise and to
# guarantee no self-trigger loop from the title edit.

name: On new issue

on:
  issues:
    types: [opened]

# Most steps run under the App installation token (which scopes its own
# permissions); the workflow-level GITHUB_TOKEN is unused for mutations.
permissions:
  issues: read

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.9.3
        with:
          app-id: ${{ secrets.TOKENLIST_BOT_APP_ID }}
          private-key: ${{ secrets.TOKENLIST_BOT_PRIVATE_KEY }}

      # Sparse checkout of just tokens/ so the parse step can resolve
      # chainId → chain-key locally (no network dependency).
      - name: Checkout tokens/ (for chain-name lookup)
        if: >-
          contains(github.event.issue.labels.*.name, 'token-request') ||
          contains(github.event.issue.labels.*.name, 'deny-request')
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          sparse-checkout: |
            tokens
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: Parse form fields and rewrite title
        id: parse
        if: >-
          contains(github.event.issue.labels.*.name, 'token-request') ||
          contains(github.event.issue.labels.*.name, 'deny-request')
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            // Split-based field parser. Same pattern as process-token-issue.yml.
            // Issue Forms render each field as `### <Label>\n\n<value>\n\n`.
            // Multi-line values (textareas, code-fence-wrapped `render: text` blocks)
            // need to be captured in full — a non-greedy regex with a multi-line
            // `\n*$` lookahead silently truncates them at the first newline, so we
            // split on `### ` heading lines instead.
            const body = context.payload.issue.body || '';
            const fields = {};
            for (const section of body.split(/^### /m).slice(1)) {
              const nl = section.indexOf('\n');
              if (nl === -1) continue;
              fields[section.slice(0, nl).trim()] = section.slice(nl + 1).trim();
            }
            const get = (label) => {
              const v = fields[label];
              if (!v || v === '_No response_') return '';
              return v;
            };

            const labels = (context.payload.issue.labels || []).map((l) => l.name);
            const hasTokenRequest = labels.includes('token-request');
            const hasDenyRequest = labels.includes('deny-request');
            if (hasTokenRequest && hasDenyRequest) {
              // Ambiguous — refuse to pick a flow rather than silently routing
              // to one. The process-token-issue workflow has the same guard.
              core.warning('Issue has both `token-request` and `deny-request` labels — title rewrite skipped (ambiguous).');
              core.setOutput('title', context.payload.issue.title);
              return;
            }
            const requestType = hasTokenRequest ? 'add' : 'deny';
            core.setOutput('requestType', requestType);
            core.setOutput('command', requestType === 'add' ? '/add-token' : '/deny-token');

            const chainId = get('Chain ID');
            const address = get('Token contract address');
            // Symbol exists only on the add form; deny form has no symbol field.
            const symbol = requestType === 'add' ? get('Symbol') : '';

            // Resolve the numeric chainId to its LI.FI chain key (e.g. 1 → "ETH",
            // 8453 → "BAS") by scanning the tokens/ directory. The filename
            // (minus .json) IS the chain key the rest of the LI.FI stack uses,
            // so this is the authoritative mapping and stays in sync with the
            // repo automatically — no network call, no flakiness.
            //
            // Falls back to "chain <N>" only when the chainId isn't in the
            // repo at all (rare — would mean a new chain partners are
            // requesting before it's been added to the repo).
            const fs = require('node:fs');
            const path = require('node:path');
            function resolveChainName(cid) {
              if (!cid) return '';
              const numId = Number(cid);
              const fallback = `chain ${cid}`;
              if (!Number.isInteger(numId)) return fallback;
              const tokensDir = path.resolve('tokens');
              try {
                for (const filename of fs.readdirSync(tokensDir)) {
                  if (!filename.endsWith('.json')) continue;
                  try {
                    const list = JSON.parse(fs.readFileSync(path.join(tokensDir, filename), 'utf8'));
                    if (Array.isArray(list) && list.length > 0 && list[0].chainId === numId) {
                      return filename.slice(0, -5); // strip ".json" → "ETH", "ARB", "BAS"
                    }
                  } catch { /* skip unreadable file */ }
                }
              } catch (e) {
                core.warning(`Chain-name lookup failed: ${e.message}. Falling back to "${fallback}".`);
              }
              return fallback;
            }
            const chainName = resolveChainName(chainId);
            core.setOutput('chainName', chainName);

            // Compose the rewritten title differently per flow:
            //   add  → "[token request] <ChainName> <symbol>"
            //   deny → "[deny request] <ChainName> <0xshort…>"
            let newTitle;
            if (requestType === 'add') {
              if (!chainId || !symbol) {
                core.warning(`Could not parse chainId="${chainId}" symbol="${symbol}" from issue body; leaving title unchanged.`);
                core.setOutput('title', context.payload.issue.title);
                return;
              }
              newTitle = `[token request] ${chainName} ${symbol}`;
            } else {
              if (!chainId || !address) {
                core.warning(`Could not parse chainId="${chainId}" address="${address}" from issue body; leaving title unchanged.`);
                core.setOutput('title', context.payload.issue.title);
                return;
              }
              // Truncate the address for the title (full form is in the issue body).
              const shortAddr = address.length > 12 ? `${address.slice(0, 10)}…${address.slice(-4)}` : address;
              newTitle = `[deny request] ${chainName} ${shortAddr}`;
            }

            if (newTitle === context.payload.issue.title) {
              core.info(`Title is already "${newTitle}"; no rewrite needed.`);
              core.setOutput('title', newTitle);
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              title: newTitle,
            });
            core.info(`Rewrote issue #${context.payload.issue.number} title to "${newTitle}".`);
            core.setOutput('title', newTitle);

      - name: Post to Slack
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_DEV_BACKEND_EXPANSION_REVIEW }}
          webhook-type: incoming-webhook
          # Slack message layout uses Block Kit (header + section + section + context).
          # Rationale: GitHub Actions expressions inside single-quoted strings
          # don't interpret escape sequences, so a "\n" embedded in a format()
          # call would render as the literal characters "\n" in the resulting
          # mrkdwn. Splitting the message into one block per logical line
          # avoids the problem entirely and gives us nicer visual separation
          # in Slack.
          #
          # User-controlled values (issue title, user login) are wrapped in
          # toJSON(format()) so any embedded quotes, backslashes, or newlines
          # are safely escaped and can't break the JSON payload structure.
          payload: |
            {
              "text": ${{ toJSON(format('🆕 New request on customized-token-list — #{0} {1}', github.event.issue.number, steps.parse.outputs.title || github.event.issue.title)) }},
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🆕 New request received",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(format('On *customized-token-list*: <{0}|#{1} — {2}>, submitted by `{3}` and ready for review.', github.event.issue.html_url, github.event.issue.number, steps.parse.outputs.title || github.event.issue.title, github.event.issue.user.login)) }}
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(format('Please convert it to a PR by commenting `{0}` under the issue. A bot will create a PR from the submitted data that you can review and merge immediately. Members of `@lifinance/fullstack` or `@lifinance/techsupport` can do this.', steps.parse.outputs.command || '/add-token or /deny-token')) }}
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Please mark this message with a ✅ reaction once the PR is merged, so the team knows it's handled."
                    }
                  ]
                }
              ]
            }
